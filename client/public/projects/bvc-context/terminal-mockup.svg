<svg xmlns="http://www.w3.org/2000/svg" width="800" height="450" viewBox="0 0 800 450">
  <defs>
    <style>
      .mono { font-family: 'JetBrains Mono', 'Fira Code', 'Cascadia Code', 'Menlo', 'Courier New', monospace; }
    </style>
  </defs>

  <!-- Terminal window background -->
  <rect width="800" height="450" rx="10" ry="10" fill="#0d1117"/>

  <!-- Title bar -->
  <rect width="800" height="36" rx="10" ry="10" fill="#161b22"/>
  <rect y="18" width="800" height="18" fill="#161b22"/>

  <!-- Traffic lights -->
  <circle cx="20" cy="18" r="6" fill="#ff5f57"/>
  <circle cx="40" cy="18" r="6" fill="#febc2e"/>
  <circle cx="60" cy="18" r="6" fill="#28c840"/>

  <!-- Title bar text -->
  <text x="400" y="23" text-anchor="middle" class="mono" fill="#8b949e" font-size="12">claude — bvc-context-private</text>

  <!-- Separator line -->
  <line x1="0" y1="36" x2="800" y2="36" stroke="#21262d" stroke-width="1"/>

  <!-- Content area -->
  <!-- Line 1: Working directory -->
  <text x="20" y="64" class="mono" font-size="13" fill="#8b949e">~/Documents/bvc/bvc-context-private</text>
  <text x="20" y="82" class="mono" font-size="13">
    <tspan fill="#58a6ff">❯</tspan>
    <tspan fill="#e6edf3" dx="6">/plan-feature invoice PDF generation with DocuSign signature</tspan>
  </text>

  <!-- Divider -->
  <line x1="20" y1="94" x2="780" y2="94" stroke="#21262d" stroke-width="1" stroke-dasharray="4,4"/>

  <!-- Claude response block -->
  <!-- Model badge -->
  <rect x="20" y="102" width="130" height="18" rx="3" fill="#1c2333" stroke="#30363d" stroke-width="1"/>
  <text x="28" y="115" class="mono" font-size="11" fill="#79c0ff">⬡ claude-opus-4-6</text>

  <!-- Skill invocation line -->
  <text x="20" y="140" class="mono" font-size="12" fill="#3fb950">✓ plan-feature</text>
  <text x="120" y="140" class="mono" font-size="12" fill="#8b949e">  reading registry/services.md, architecture/data-flow.md …</text>

  <!-- Response text -->
  <text x="20" y="166" class="mono" font-size="13" fill="#e6edf3">Affected services  <tspan fill="#58a6ff">( 4 repos )</tspan></text>

  <!-- Service list -->
  <text x="20" y="188" class="mono" font-size="12">
    <tspan fill="#f78166">▸</tspan>
    <tspan fill="#ffa657" dx="6">bvc-backend</tspan>
    <tspan fill="#8b949e" dx="4">— Express action handler  /actions/invoices/generatePdf</tspan>
  </text>
  <text x="20" y="207" class="mono" font-size="12">
    <tspan fill="#f78166">▸</tspan>
    <tspan fill="#ffa657" dx="6">database</tspan>
    <tspan fill="#8b949e" dx="4">— Hasura action  create_invoice_pdf  (metadata/actions.yaml)</tspan>
  </text>
  <text x="20" y="226" class="mono" font-size="12">
    <tspan fill="#f78166">▸</tspan>
    <tspan fill="#ffa657" dx="6">reporting-engine</tspan>
    <tspan fill="#8b949e" dx="4">— Spring Boot 3  POST /reports/invoice  → S3 upload</tspan>
  </text>
  <text x="20" y="245" class="mono" font-size="12">
    <tspan fill="#f78166">▸</tspan>
    <tspan fill="#ffa657" dx="6">bvc-frontend</tspan>
    <tspan fill="#8b949e" dx="4">— React/Apollo mutation  useGenerateInvoicePdf hook</tspan>
  </text>

  <!-- Section: Implementation order -->
  <text x="20" y="271" class="mono" font-size="13" fill="#e6edf3">Smallest safe deploy order</text>
  <text x="20" y="290" class="mono" font-size="12" fill="#8b949e">  1. reporting-engine  →  2. database (metadata apply)  →  3. bvc-backend  →  4. bvc-frontend</text>

  <!-- Section: Validation -->
  <text x="20" y="314" class="mono" font-size="13" fill="#e6edf3">Validation plan</text>
  <text x="20" y="333" class="mono" font-size="12">
    <tspan fill="#3fb950">✓</tspan>
    <tspan fill="#8b949e" dx="4">reporting-engine: JUnit  InvoicePdfServiceTest  +  S3 mock fixture</tspan>
  </text>
  <text x="20" y="352" class="mono" font-size="12">
    <tspan fill="#3fb950">✓</tspan>
    <tspan fill="#8b949e" dx="4">bvc-backend: Jest action handler test against Hasura sandbox</tspan>
  </text>
  <text x="20" y="371" class="mono" font-size="12">
    <tspan fill="#3fb950">✓</tspan>
    <tspan fill="#8b949e" dx="4">DocuSign envelope: stub via  DOCUSIGN_MOCK=true  in  .env.test</tspan>
  </text>

  <!-- Divider -->
  <line x1="20" y1="386" x2="780" y2="386" stroke="#21262d" stroke-width="1" stroke-dasharray="4,4"/>

  <!-- Follow-up prompt line -->
  <text x="20" y="408" class="mono" font-size="13">
    <tspan fill="#58a6ff">❯</tspan>
    <tspan fill="#8b949e" dx="6">/hasura-action-trace create_invoice_pdf</tspan>
  </text>
  <text x="20" y="428" class="mono" font-size="12">
    <tspan fill="#3fb950">✓ hasura-action-trace</tspan>
    <tspan fill="#8b949e" dx="4">  tracing action handler → bvc-backend → reporting-engine …</tspan>
  </text>

  <!-- Blinking cursor -->
  <rect x="20" y="434" width="8" height="13" fill="#58a6ff" opacity="0.9">
    <animate attributeName="opacity" values="0.9;0;0.9" dur="1.2s" repeatCount="indefinite"/>
  </rect>
</svg>
